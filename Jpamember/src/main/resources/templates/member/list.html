<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>회원 목록</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrapicons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table thead th { background-color: #0D47A1; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/member/list">
            <i class="bi bi-people-fill"></i> 회원관리 (JPA)
        </a>
        <a href="/member/new" class="btn btn-outline-light btn-sm">
            <i class="bi bi-person-plus"></i> 회원 등록
        </a>
    </div>
</nav>
<div class="container">
    <!-- 플래시 메시지 -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle"></i> <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <!-- 검색 -->
    <form th:action="@{/member/list}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control"
                   placeholder="이름으로 검색" th:value="${keyword}">
            <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> 검색
            </button>
            <a href="/member/list" class="btn btn-outline-secondary">초기화</a>
        </div>
    </form>
    <!-- 목록 테이블 -->
    <div class="card shadow-sm"><div class="card-body p-0">
        <table class="table table-hover table-striped mb-0">
            <thead><tr>
                <th style="width:80px">ID</th><th>이름</th><th>이메일</th>
                <th style="width:160px" class="text-center">관리</th>
            </tr></thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(members)}">
                <td colspan="4" class="text-center text-muted py-4">등록된 회원이 없습니
                    다.</td>
            </tr>
            <tr th:each="member : ${members}">
                <td th:text="${member.id}"></td>
                <td class="fw-semibold" th:text="${member.name}"></td>
                <td th:text="${member.email}"></td>
                <td class="text-center">
                    <a th:href="@{/member/edit/{id}(id=${member.id})}" class="btn btn-sm
btn-outline-primary me-1">수정</a>
                    <a th:href="@{/member/delete/{id}(id=${member.id})}"
                       onclick="return confirm('정말 삭제하시겠습니까?')" class="btn btn-sm btnoutline-danger">삭제</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div></div>
</div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body></html>
